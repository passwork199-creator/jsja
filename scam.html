<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring Tool</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .btn {
            background-color: #222;
            border: 1px solid #444;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.3s;
        }
        .btn:active {
            background-color: #444;
        }
        h1 { font-weight: 300; }
        p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Respring Your iDevice</h1>
    <p>Нажатие на кнопку вызовет перезагрузку SpringBoard</p>
    
    <button class="btn" onclick="doRespring()">Respring</button>

    <script>
        function doRespring() {
            // Метод через создание огромного количества элементов или манипуляцию со шрифтами
            // В современных версиях это часто работает через перегрузку памяти CSS-фильтрами
            // или специфическими символами.
            
            alert("Устройство сейчас перезагрузится...");
            
            let container = document.createElement('div');
            container.style.backdropFilter = 'blur(100px)'; // Нагрузка на GPU
            
            // Цикл для создания нагрузки, характерной для подобных "краш-страниц"
            for (let i = 0; i < 5000; i++) {
                let el = document.createElement('div');
                el.style.width = '100px';
                el.style.height = '100px';
                el.style.backdropFilter = 'blur(50px)';
                document.body.appendChild(el);
            }
            
            // Попытка вызвать сбой через переполнение строки (классический метод vityaig)
            window.location.href = "index.html?" + "A".repeat(1000000);
        }
    </script>
</body>
</html>
